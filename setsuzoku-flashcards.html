<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunpou · Setsuzoku & Onomatope Flashcard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>(function(){try{var t=localStorage.getItem('jlpt_theme');if(t&&JSON.parse(t)==='dark'){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();</script>
</head>
<body class="app">
<div class="main">
  <div class="content" style="max-width: 600px; padding-top: 30px;">
    
    <div class="page-head" style="margin-bottom: 20px;">
      <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 4px;">Flashcard</h1>
      <p style="color: var(--text-muted); font-size: 13.5px;">Active recall &middot; ketuk kartu untuk membalik</p>
    </div>
    
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
      
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 20px; width: 100%;">
        <!-- Quantity Selector Pills -->
        <div class="fc-deck-selector" id="countSelector" style="margin: 0;">
          <button class="fc-deck-tab" data-val="10">10</button>
          <button class="fc-deck-tab active" data-val="20">20</button>
          <button class="fc-deck-tab" data-val="30">30</button>
          <button class="fc-deck-tab" data-val="50">50</button>
        </div>
        
        <!-- Deck Selector Pills -->
        <div class="fc-deck-selector" id="deckSelector" style="margin: 0;">
          <button class="fc-deck-tab active" data-val="all">Semua</button>
          <button class="fc-deck-tab" data-val="setsuzokushi">Setsuzokushi</button>
          <button class="fc-deck-tab" data-val="onomatope">Onomatope</button>
        </div>
      </div>

      <!-- Play Area -->
      <div id="fcPlayArea" style="width: 100%;">
        <div class="spinner"></div>
      </div>

    </div>
  </div>
</div>

<script src="data/setsuzokushi-data.js"></script>
<script src="data/onomatope-data.js"></script>
<script src="js/storage.js"></script>
<script src="js/nav.js"></script>
<script src="js/setsuzoku-flashcards.js"></script>
<script>
(function () {
  Nav.build("setsuzoku-flashcards.html");
  if (window.SetsuzokuFlashcardUI) {
    window.SetsuzokuFlashcardUI.init();
  }
})();
</script>
</body>
</html>
